name: Supabase Keep-Alive

on:
  schedule:
    - cron: '17 9 * * *'   # Todos los días 9:17 UTC (minuto 17 para evitar la congestión de crons en punto)
  workflow_dispatch:        # Permite ejecutar manualmente desde GitHub

permissions:
  actions: write            # Necesario para que el workflow se re-habilite a sí mismo

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (escritura RPC + lectura)
        run: |
          node -e "
          const https = require('https');
          const base = process.env.VITE_SUPABASE_URL;
          const key = process.env.VITE_SUPABASE_ANON_KEY;

          function request(method, path, body) {
            return new Promise((resolve, reject) => {
              const url = new URL(base + path);
              console.log('Host:', url.hostname, '-', method, url.pathname);
              const headers = {
                'apikey': key,
                'Authorization': 'Bearer ' + key
              };
              if (body) {
                headers['Content-Type'] = 'application/json';
                headers['Content-Length'] = Buffer.byteLength(body);
              }
              const req = https.request({
                hostname: url.hostname,
                path: url.pathname + url.search,
                method: method,
                headers: headers
              }, res => {
                let data = '';
                res.on('data', c => { data += c; });
                res.on('end', () => {
                  console.log('Status:', res.statusCode, data.slice(0, 200));
                  if (res.statusCode < 400) resolve();
                  else reject(new Error('HTTP ' + res.statusCode));
                });
              });
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          (async () => {
            // Escritura real (señal de actividad principal): UPDATE del timestamp vía RPC
            await request('POST', '/rest/v1/rpc/keepalive_ping', '{}');
            // Lectura (segunda señal, la que usaba el workflow original)
            await request('GET', '/rest/v1/ventas?select=id&limit=1');
            console.log('Keep-alive OK');
          })().catch(e => { console.error('Keep-alive FALLO:', e.message); process.exit(1); });
          "
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # GitHub desactiva los crons tras 60 días sin actividad en el repo.
      # Llamar a "enable" (aunque ya esté habilitado) resetea ese contador,
      # así el workflow se mantiene vivo solo, sin necesidad de commits.
      - name: Evitar auto-disable del cron (60 días)
        run: gh workflow enable supabase-keepalive.yml --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ github.token }}
